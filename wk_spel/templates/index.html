<!DOCTYPE html>
<html>

<head>
    <title>WK Utrecht Spel</title>

    <meta http-equiv="refresh" content="20">

    <style>

        body {
            margin: 0;
            padding: 0;
            font-family: Arial;
        }

        .scoreboard {
            position: absolute;
            z-index: 9999;

            top: 10px;
            left: 10px;

            background: white;

            padding: 15px;

            border-radius: 12px;

            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        .scoreboard h2 {
            margin-top: 0;
        }

        iframe {
            width: 100%;
            height: 100vh;
            border: none;
        }

    </style>
</head>

<body>

    <div class="scoreboard">

        <h2>WK Drankspel</h2>

        <div>🔴 Rood: {{ scores.red }}</div>
        <div>🔵 Blauw: {{ scores.blue }}</div>
        <div>🟢 Groen: {{ scores.green }}</div>
        <div>🟡 Geel: {{ scores.yellow }}</div>

    </div>

    {{ map_html|safe }}

</body>
</html>
