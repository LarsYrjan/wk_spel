<!DOCTYPE html>
<html>

<head>
    <title>WK Utrecht Spel</title>

    <meta http-equiv="refresh" content="20">

    <style>

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: Arial;
        }

        .scoreboard {
            position: absolute;
            z-index: 9999;

            top: 10px;
            left: 10px;

            background: white;

            padding: 15px;

            border-radius: 12px;

            box-shadow: 0 0 10px rgba(0,0,0,0.3);

            min-width: 220px;
        }

        .scoreboard h2 {
            margin-top: 0;
            margin-bottom: 15px;
        }

        .team-score {
            display: flex;
            align-items: center;
            gap: 10px;

            margin-bottom: 10px;

            font-size: 18px;
        }

        .team-score img {
            width: 32px;
            height: auto;

            border-radius: 3px;

            border: 1px solid #ccc;
        }

        #map {
            width: 100%;
            height: 100vh;
        }

    </style>
</head>

<body>

    <div class="scoreboard">

        <h2>WK Drankspel</h2>

        <div class="team-score">
            <img src="/static/flags/turkey.jpg">
            Turkije: {{ scores.red }}
        </div>

        <div class="team-score">
            <img src="/static/flags/curacao.jpg">
            Curaçao: {{ scores.blue }}
        </div>

        <div class="team-score">
            <img src="/static/flags/korea.jpg">
            Zuid-Korea: {{ scores.green }}
        </div>

        <div class="team-score">
            <img src="/static/flags/austria.jpg">
            Oostenrijk: {{ scores.yellow }}
        </div>

        <div class="team-score">
            <img src="/static/flags/england.jpg">
            Engeland: {{ scores.pink }}
        </div>

    </div>

    <div id="map">
        {{ map_html|safe }}
    </div>

</body>
</html>
